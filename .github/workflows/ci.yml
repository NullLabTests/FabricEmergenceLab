name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
      - name: Lint with ruff
        run: ruff check .
      - name: Format check with ruff
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run tests
        run: pytest -v --tb=short 2>&1 || echo "No tests found yet — skipping"
      - name: Verify experiment can import
        run: |
          python -c "from fabricpc_extensions import PCAgent, WorldModel, SharedMemory, CommunicationChannel, Population"
          python -c "from adapters import GridWorldAdapter"
